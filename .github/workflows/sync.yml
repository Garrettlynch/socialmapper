name: Sync BlueSky Tiles

on:
  #schedule:                  # Comment out with a # schedule
  #  - cron: '*/30 * * * *'   # and cron to deactivate automated execution
  workflow_dispatch:         # This keeps the manual "Run workflow" button on Github active

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to v5
        with:
          python-version: '3.10'      # Fixed: uses dash, not underscore

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Sync Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python sync_map.py

      - name: Commit and Push New Tiles
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add tiles/
          # This line checks if there are actually changes before trying to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync new tiles from BlueSky" && git push)
