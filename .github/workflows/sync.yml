name: Sync BlueSky Tiles

on:
  schedule:
    - cron: '*/30 * * * *' # This tells GitHub to run every 30 minutes
  workflow_dispatch:      # This adds a "Run Now" button so you can test it immediately

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Sync Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python sync_map.py

      - name: Commit and Push New Tiles
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync new tiles from BlueSky" && git push)
