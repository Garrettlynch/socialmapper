name: Sync BlueSky Tiles

on:
  workflow_dispatch:         # This keeps the manual "Run workflow" button on Github active
  # Comment out with a # schedule and cron to deactivate automated execution
  #schedule:  
  #  - cron: '*/30 * * * *'


permissions:
	contents: write  # MANDATORY: Allows the bot to save images to your repo

jobs:
	sync-tiles:
		runs-on: ubuntu-latest
		steps:
			- name: Checkout repository
			  uses: actions/checkout@v4

			- name: Set up Python
			  uses: actions/setup-python@v5
			  with:
				python-version: '3.10'

			- name: Install dependencies
			  run: |
				python -m pip install --upgrade pip
				if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
				pip install requests  # Safety net: ensure requests is always there

			- name: Run sync script
			  env:
				BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
				BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
			  run: python sync_map.py

			- name: Commit and push changes
			  run: |
				git config --global user.name "github-actions[bot]"
				git config --global user.email "github-actions[bot]@users.noreply.github.com"
				git add tiles/
				git commit -m "Sync tiles from BlueSky" || exit 0
				git push
