<!-- Leaflet.js -->
<script src="resources/leaflet.js"></script>

<script>

// set tile size, world size (number of tiles), default tile, max and min zoom
const CONFIG = {
	tileSize: 512, 
	worldSize: 20, 
	defaultTileURL: 'tiles/default-',
	maxZoom: 5,
	minZoom: 0,
	padding: 0.5,
	fadeAnimation: false,
	keepBuffer: 8
};

// create map
var map = L.map('map', {
	crs: L.CRS.Simple, // use the simple map
	minZoom: CONFIG.minZoom, 
	maxZoom: CONFIG.maxZoom, 
	attributionControl: false, 
	fadeAnimation: true // fade tiles in
});

// calculate center based on tile size
//var center = map.unproject([CONFIG.tileSize / 2, CONFIG.tileSize / 2], 0);
//map.setView(center, 0);


// Function to convert Tile X/Y to Lat/Lng for centering
function getTileCenter(z, x, y)
{
	// multiply by tileSize to get the pixel center of the tile
	const centerX = (x + 0.5) * CONFIG.tileSize;
	const centerY = (y + 0.5) * CONFIG.tileSize;

	// unproject converts those pixel coordinates into LatLng for the map
	return map.unproject([centerX, centerY], z);
}


// fetch the latest tile data (the last two tile posts) and handle the intro animation
fetch('latest.json')
	.then(response => response.json())
	.then(data => {

		if (!data.newest)
		{
			const fallback = map.unproject([CONFIG.tileSize / 2, CONFIG.tileSize / 2], 0);
			map.setView(fallback, 0);
			return;
		}

		// ensure coordinates are treated as Numbers, not Strings
		const newest = {
			z: Number(data.newest.z),
			x: Number(data.newest.x),
			y: Number(data.newest.y)
		};

		const newestPoint = getTileCenter(newest.z, newest.x, newest.y);

		if (data.previous)
		{
			const previous = {
				z: Number(data.previous.z),
				x: Number(data.previous.x),
				y: Number(data.previous.y)
			};

			const oldPoint = getTileCenter(previous.z, previous.x, previous.y);

			map.setView(oldPoint, previous.z);

			setTimeout(() => {

				// calculate dimensions based on the target zoom
				const worldWidth = CONFIG.worldSize * Math.pow(2, newest.z) * CONFIG.tileSize;
				const worldHeight = worldWidth; 

				// project current center and target center into pixel space at the target zoom
				const currentCenter = map.project(map.getCenter(), newest.z);
				const targetCenter = map.project(newestPoint, newest.z);

				// calculate the distance (delta) for both axes
				let dx = targetCenter.x - currentCenter.x;
				let dy = targetCenter.y - currentCenter.y;

				// wrap X: if distance is more than half the world width, take the shortcut
				if (Math.abs(dx) > worldWidth / 2) dx = dx > 0 ? dx - worldWidth : dx + worldWidth;

				// wrap Y: apply the same logic to prevent the massive vertical arc
				if (Math.abs(dy) > worldHeight / 2) dy = dy > 0 ? dy - worldHeight : dy + worldHeight;

				// unproject the relative point to get the spatially closest LatLng
				const shortestPathPoint = map.unproject([currentCenter.x + dx, currentCenter.y + dy], newest.z);

				map.flyTo(shortestPathPoint, newest.z, {
					animate: true,
					duration: 3.0, 
					easeLinearity: 0.1,
					noMoveStart: true
				});

			}, 3000);
		} else {
			map.setView(newestPoint, newest.z);
		}
	})
	.catch(err => {
		// fallback if latest.json fails to load
		const fallback = map.unproject([CONFIG.tileSize / 2, CONFIG.tileSize / 2], 0);
		map.setView(fallback, 0);
    });

L.TileLayer.CustomSync = L.TileLayer.extend({
	createTile: function(coords, done) {
		var tile = document.createElement('img');
		tile.classList.add('leaflet-tile'); 
		tile.style.visibility = 'hidden';

		// wrapping logic for infinite panning
		const worldSizeAtZoom = CONFIG.worldSize * Math.pow(2, coords.z);
		const x = ((coords.x % worldSizeAtZoom) + worldSizeAtZoom) % worldSizeAtZoom;
		const y = ((coords.y % worldSizeAtZoom) + worldSizeAtZoom) % worldSizeAtZoom;

		// look for .webp files
		const tileUrl = `tiles/${coords.z}/${x}/${y}.webp`;

		tile.onload = function() { 
			tile.style.visibility = 'visible';
			tile.classList.add('leaflet-tile-loaded');
			done(null, tile);
		};

		tile.onerror = function() {
			// if the .webp tile is missing, show the default placeholder
			if (tile.src !== window.location.origin + '/' + CONFIG.defaultTile && !tile.src.includes(CONFIG.defaultTile))
			{
				// random images from a set
				let num = Math.ceil(Math.random() * 10);
				tile.src = CONFIG.defaultTileURL + num + '.webp';
				console.log(tile.src);
			} else {
				// if even the default fails, hide it
				tile.style.visibility = 'hidden';
				done(null, tile);
			}
		};

		tile.src = tileUrl;
		return tile;
	}
});


// define the admin grid layer (to see coordinates)
L.DebugGrid = L.GridLayer.extend({
	createTile: function (coords) {
		const tile = document.createElement('div');
		tile.classList.add('debug-tile');

		const worldSizeAtZoom = CONFIG.worldSize * Math.pow(2, coords.z);
		const wrappedX = ((coords.x % worldSizeAtZoom) + worldSizeAtZoom) % worldSizeAtZoom;
		const wrappedY = ((coords.y % worldSizeAtZoom) + worldSizeAtZoom) % worldSizeAtZoom;

		tile.innerHTML = `<div><span>Z: ${coords.z}</span>X: ${wrappedX}<br>Y: ${wrappedY}</div>`;

		return tile;
	}
});


// create an instance of the admin grid
var debugGrid = new L.DebugGrid({
	tileSize: CONFIG.tileSize,
	noWrap: false
});

// set tile size, wrap and map size
var gameLayer = new L.TileLayer.CustomSync('', {
	tileSize: CONFIG.tileSize, 
	noWrap: false, 
	updateWhenIdle: true, // Only load tiles when panning stops
	updateWhenZooming: false,
	updateInterval: 10,
	//keepBuffer: 2 // Don't keep too many tiles in memory
});

gameLayer.addTo(map);

</script>
